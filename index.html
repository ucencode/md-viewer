    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)']],
        displayMath: [['\\[', '\\]']]
      },
      startup: {
        typeset: false,
        ready() {
          MathJax.startup.defaultReady();
          const p = document.getElementById('preview');
          if (p) MathJax.typesetPromise([p]);
        }
      }

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        svg.lucide { display: inline-block; vertical-align: middle; stroke-width: 2; }
        .pane-actions svg.lucide { width: 14px; height: 14px; }
        .tools-handle svg.lucide { width: 13px; height: 13px; }
        .zen-exit svg.lucide { width: 13px; height: 13px; }
        .chip-del svg.lucide { width: 10px; height: 10px; }
        #theme-toggle svg.lucide, #dual-mode-btn svg.lucide { width: 15px; height: 15px; }

        :root {
            --bg: #f4f4f4;
            --surface: #ffffff;
            --border: #e2e2e2;
            --text: #1a1a1a;
            --text-muted: #a0a0a0;
            --accent: #89b4fa;
            --danger: #e07b54;
            --topbar-h: 44px;
            --bottombar-h: 48px;
            --label-h: 30px;
        }

        body.dark-theme {
            --bg: #1c1c1e;
            --surface: #28282a;
            --border: #3c3c3e;
            --text: #ebebf0;
            --text-muted: #7c7c80;
            --accent: #89b4fa;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Topbar ── */
        .topbar {
            height: var(--topbar-h);
            display: flex;
            align-items: center;
            padding: 0 14px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            gap: 10px;
            transition: background 0.2s, border-color 0.2s;
        }

        .app-title {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: var(--text);
        }

        .save-indicator {
            font-size: 11px;
            color: var(--text-muted);
            transition: color 0.2s;
        }

        .save-indicator.unsaved { color: var(--danger); }

        .topbar-spacer { flex: 1; }

        .topbar-actions { display: flex; gap: 6px; }

        /* ── Buttons ── */
        button {
            padding: 5px 11px;
            font-size: 12px;
            font-family: inherit;
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
            white-space: nowrap;
            line-height: 1.4;
        }

        button:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        button.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        button.active:hover {
            opacity: 0.85;
            color: #fff;
        }

        /* ── Main split pane ── */
        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        .pane-label {
            height: var(--label-h);
            padding: 0 14px;
            display: flex;
            align-items: center;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.09em;
            color: var(--text-muted);
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            transition: background 0.2s, border-color 0.2s;
        }

        .pane-actions {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-group {
            display: flex;
            gap: 3px;
        }

        .pane-actions button {
            padding: 2px 7px;
            font-size: 13px;
            line-height: 1;
            border-radius: 5px;
        }

        .split-divider {
            width: 1px;
            background: var(--border);
            flex-shrink: 0;
            transition: background 0.2s;
        }

        /* ── Editor ── */
        #editor {
            flex: 1;
            padding: 18px 20px;
            border: none;
            resize: none;
            outline: none;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.7;
            background: var(--surface);
            color: var(--text);
            overflow: auto;
            transition: background 0.2s, color 0.2s;
        }

        #editor::placeholder { color: var(--text-muted); }

        /* ── Preview ── */
        #preview-wrapper {
            flex: 1;
            overflow: auto;
            background: var(--surface);
            transition: background 0.2s;
            position: relative;
        }

        #caret-indicator {
            position: absolute;
            display: none;
            align-items: center;
            gap: 6px;
            pointer-events: none;
            z-index: 5;
            transform: translateY(-50%);
        }

        .caret-label {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: #fff;
            background: var(--accent);
            padding: 2px 7px;
            border-radius: 3px;
            white-space: nowrap;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .caret-line {
            flex: 1;
            height: 1.5px;
            background: var(--accent);
            opacity: 0.5;
        }

        #preview {
            max-width: 700px;
            margin: 0 auto;
            padding: 28px 28px 48px;
            font-size: 15px;
            line-height: 1.78;
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        #preview h1, #preview h2, #preview h3,
        #preview h4, #preview h5, #preview h6 {
            margin-top: 1.4em;
            margin-bottom: 0.5em;
            font-weight: 600;
            line-height: 1.3;
            color: var(--text);
        }

        #preview h1, #preview h2 {
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.3em;
        }

        #preview h1 { font-size: 1.7em; }
        #preview h2 { font-size: 1.3em; }
        #preview h3 { font-size: 1.1em; }

        #preview p { margin: 0.7em 0; }

        #preview a { color: var(--accent); text-decoration: none; }
        #preview a:hover { text-decoration: underline; }

        #preview code {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Consolas', monospace;
            font-size: 0.84em;
        }

        #preview :not(pre) > code {
            background: rgba(0, 0, 0, 0.06);
            padding: 0.15em 0.4em;
            border-radius: 4px;
        }

        body.dark-theme #preview :not(pre) > code { background: rgba(255, 255, 255, 0.08); }

        #preview pre {
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: auto;
            margin: 0;
        }

        .code-block-wrapper {
            position: relative;
            margin: 1em 0;
        }

        .copy-code-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 4px 6px;
            font-size: 11px;
            line-height: 1;
            background: rgba(0, 0, 0, 0.25);
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.15s, background 0.15s;
            backdrop-filter: blur(4px);
        }

        .copy-code-btn svg.lucide { width: 12px; height: 12px; }
        .code-block-wrapper:hover .copy-code-btn { opacity: 1; }
        .copy-code-btn:hover { background: rgba(0, 0, 0, 0.5); color: #fff; border-color: transparent; }

        #preview pre code.hljs { display: block; min-width: max-content; border-radius: 5px; font-size: 0.875em; padding: 14px 16px; background: var(--bg) !important; }

        #preview blockquote {
            margin: 1em 0;
            padding: 4px 16px;
            color: var(--text-muted);
            border-left: 3px solid var(--border);
        }

        #preview table {
            border-collapse: collapse;
            width: 100%;
            margin: 1em 0;
            font-size: 0.9em;
        }

        #preview table th, #preview table td {
            padding: 7px 12px;
            border: 1px solid var(--border);
            text-align: left;
        }

        #preview table th {
            background: var(--bg);
            font-weight: 600;
        }

        #preview table tr:nth-child(2n) td { background: var(--bg); }

        #preview img { max-width: 100%; border-radius: 4px; }

        #preview hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 2em 0;
        }

        #preview ul, #preview ol { padding-left: 1.6em; margin: 0.6em 0; }
        #preview li { margin: 0.2em 0; }

        /* ── Tools drawer ── */
        .tools-handle {
            width: 100%;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            font-size: 11px;
            font-family: inherit;
            color: var(--text-muted);
            background: var(--bg);
            border: none;
            border-top: 1px solid var(--border);
            cursor: pointer;
            flex-shrink: 0;
            transition: color 0.15s, background 0.15s, border-color 0.2s;
            letter-spacing: 0.04em;
        }

        .tools-handle:hover { color: var(--accent); background: var(--surface); }

        .tools-drawer {
            overflow: hidden;
            max-height: 300px;
            transition: max-height 0.25s ease;
            flex-shrink: 0;
        }

        .tools-drawer.collapsed { max-height: 0; }
        .tools-drawer.no-transition { transition: none; }

        /* ── Bottom bar ── */
        .bottombar {
            height: var(--bottombar-h);
            display: flex;
            align-items: center;
            padding: 0 14px;
            gap: 6px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            transition: background 0.2s, border-color 0.2s;
        }

        .word-count {
            font-size: 11px;
            color: var(--text-muted);
            margin-left: auto;
        }

        /* ── File panel ── */
        .file-panel {
            background: var(--bg);
            border-top: 1px solid var(--border);
            padding: 10px 14px;
            flex-shrink: 0;
            transition: background 0.2s, border-color 0.2s;
        }

        .file-panel-row {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .file-panel-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.09em;
            color: var(--text-muted);
            margin-right: 2px;
            white-space: nowrap;
        }

        .file-panel input[type="text"] {
            padding: 4px 10px;
            font-size: 12px;
            font-family: inherit;
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 6px;
            outline: none;
            width: 160px;
            transition: border-color 0.15s;
        }

        .file-panel input[type="text"]:focus { border-color: var(--accent); }

        .file-list {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 8px;
        }

        .file-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px 3px 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 11.5px;
            color: var(--text);
        }

        .file-chip .chip-load {
            cursor: pointer;
            color: var(--text);
            text-decoration: none;
        }

        .file-chip .chip-load:hover { color: var(--accent); }

        .file-chip .chip-del {
            cursor: pointer;
            color: var(--text-muted);
            font-size: 10px;
            line-height: 1;
            text-decoration: none;
        }

        .file-chip .chip-del:hover { color: var(--danger); }

        button:disabled { opacity: 0.38; cursor: not-allowed; }
        button:disabled:hover { border-color: var(--border); color: var(--text); }

        #save-to-doc svg.lucide { width: 12px; height: 12px; }

        /* ── Zen overlay exit buttons ── */
        .zen-exit {
            position: fixed;
            top: 35px;
            right: 20px;
            z-index: 999;
            display: none;
            padding: 5px 13px;
            font-size: 11.5px;
            font-family: inherit;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            backdrop-filter: blur(6px);
            transition: background 0.15s;
        }

        .zen-exit:hover { background: rgba(0, 0, 0, 0.8); color: #fff; border-color: transparent; }

        /* ── Writer Zen ── */
        body.writer-zen .preview-pane,
        body.writer-zen .split-divider {
            display: none !important;
        }

        body.writer-zen .editor-pane { background: var(--surface); }

        body.writer-zen #editor {
            width: 100%;
            padding-top: 72px;
            padding-bottom: 48px;
            padding-inline: max(28px, calc((100% - 644px) / 2));
            font-size: 14.5px;
            line-height: 1.85;
        }

        /* ── Reader Zen ── */
        body.reader-zen .editor-pane,
        body.reader-zen .split-divider,
        body.reader-zen .tools-handle,
        body.reader-zen .tools-drawer,
        body.reader-zen .topbar {
            display: none !important;
        }

        body.reader-zen .main { height: 100vh; }

        body.reader-zen #preview-wrapper { background: var(--surface); }
        body.reader-zen #preview-sync-caret { display: none !important; }
        body.reader-zen #caret-indicator { display: none !important; }

        body.reader-zen #preview {
            padding: 64px 32px 80px;
            font-size: 17px;
            line-height: 1.85;
        }

        body.reader-zen #zen-reader-exit { display: block; }

        /* ── Mobile: single-pane mode ── */
        #mobile-pane-toggle { display: none; }

        @media (max-width: 768px) {
            #mobile-pane-toggle { display: flex; gap: 4px; }
            #dual-mode-btn, #reader-zen-btn { display: none; }
            .pane-actions { display: none; }
            .split-divider { display: none; }
            .preview-pane { display: none; }

            body.mobile-preview .preview-pane { display: flex; }
            body.mobile-preview .editor-pane  { display: none; }

            body.writer-zen.mobile-preview .preview-pane { display: flex !important; }
            body.writer-zen.mobile-preview .editor-pane  { display: none !important; }
        }
    </style>
</head>

    <script>
        // Protect \[...\] and \(...\) from marked.js backslash-escaping
        marked.use({
            extensions: [{
                name: 'blockMath',
                level: 'block',
                start(src) { return src.indexOf('\\['); },
                tokenizer(src) {
                    const m = src.match(/^\\\[([\s\S]*?)\\\]/);
                    if (m) return { type: 'blockMath', raw: m[0], text: m[1].trim() };
                },
                renderer(token) {
                    return `<p>\\[${token.text}\\]</p>\n`;
                }
            }, {
                name: 'inlineMath',
                level: 'inline',
                start(src) { return src.indexOf('\\('); },
                tokenizer(src) {
                    const m = src.match(/^\\\((.+?)\\\)/);
                    if (m) return { type: 'inlineMath', raw: m[0], text: m[1] };
                },
                renderer(token) {
                    return `\\(${token.text}\\)`;
                }
            }]
        });

        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true,
            gfm: true
        });

        const editor          = document.getElementById('editor');
        const preview         = document.getElementById('preview');
        const previewWrapper  = document.getElementById('preview-wrapper');
        const caretIndicator  = document.getElementById('caret-indicator');
        const copyHtmlBtn     = document.getElementById('copy-html');
        const downloadHtmlBtn = document.getElementById('download-html');
        const clearBtn        = document.getElementById('clear');
        const saveBtn         = document.getElementById('save-document');
        const loadBtn         = document.getElementById('load-document');
        const deleteBtn       = document.getElementById('delete-document');
        const documentNameInput = document.getElementById('document-name');
        const fileList        = document.getElementById('file-list');
        const themeToggle     = document.getElementById('theme-toggle');
        const themeIconWrap   = document.getElementById('theme-icon-wrap');
        const saveIndicator   = document.getElementById('save-indicator');
        const wordCount       = document.getElementById('word-count');
        const dualModeBtn     = document.getElementById('dual-mode-btn');
        const readerZenBtn    = document.getElementById('reader-zen-btn');
        const zenReaderExit   = document.getElementById('zen-reader-exit');
        const toolsHandle     = document.getElementById('tools-handle');
        const toolsDrawer     = document.getElementById('tools-drawer');
        const mobileEditorBtn = document.getElementById('mobile-editor-btn');
        const mobilePreviewBtn = document.getElementById('mobile-preview-btn');

        let currentDocument = null;
        let saveTimeout;

        initDocument();
        updateFileList();
        renderMarkdown();
        updateWordCount();

        const toolsCaretWrap = document.getElementById('tools-caret-wrap');

        function setToolsIcon(collapsed) {
            toolsCaretWrap.innerHTML = `<i data-lucide="${collapsed ? 'chevron-up' : 'chevron-down'}"></i>`;
            lucide.createIcons({ nodes: [toolsCaretWrap] });
        }

        // Tools drawer: default expanded, restore preference (skip animation on load)
        toolsDrawer.classList.add('no-transition');
        if (localStorage.getItem('toolsOpen') === 'false') {
            toolsDrawer.classList.add('collapsed');
            setToolsIcon(true);
        }
        requestAnimationFrame(() => toolsDrawer.classList.remove('no-transition'));

        toolsHandle.addEventListener('click', () => {
            const isCollapsed = toolsDrawer.classList.toggle('collapsed');
            setToolsIcon(isCollapsed);
            localStorage.setItem('toolsOpen', !isCollapsed);
        });

        // Default to zen; restore dual mode if saved and screen is wide enough
        const savedMode = localStorage.getItem('viewerMode');
        if (savedMode === 'dual' && window.innerWidth >= 768) {
            enterDualMode();
        } else {
            enterZenMode();
        }

        editor.addEventListener('input', () => {
            renderMarkdown();
            updateWordCount();
            showUnsavedChanges();
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                localStorage.setItem('editor_autosave', editor.value);
                showSaved();
            }, 1000);
        });

        copyHtmlBtn.addEventListener('click', copyHtml);
        downloadHtmlBtn.addEventListener('click', downloadHtml);
        clearBtn.addEventListener('click', clearEditor);
        saveBtn.addEventListener('click', saveDocument);
        loadBtn.addEventListener('click', loadDocument);
        deleteBtn.addEventListener('click', deleteDocument);
        themeToggle.addEventListener('click', toggleTheme);

        const saveToDocBtn   = document.getElementById('save-to-doc');
        const saveToDocLabel = document.getElementById('save-to-doc-label');
        saveToDocBtn.addEventListener('click', () => {
            if (!currentDocument) return;
            saveDocumentContent(currentDocument, editor.value);
            saveToDocBtn.classList.add('active');
            setTimeout(() => saveToDocBtn.classList.remove('active'), 1200);
        });

        document.getElementById('editor-scroll-top').addEventListener('click', () => {
            editor.scrollTop = 0;
        });

        document.getElementById('editor-scroll-caret').addEventListener('click', () => {
            editor.scrollTop = getCaretFraction() * (editor.scrollHeight - editor.clientHeight);
            editor.focus();
        });

        document.getElementById('preview-scroll-top').addEventListener('click', () => {
            previewWrapper.scrollTop = 0;
        });

        document.getElementById('preview-sync-caret').addEventListener('click', () => {
            previewWrapper.scrollTop = getCaretFraction() * (previewWrapper.scrollHeight - previewWrapper.clientHeight);
        });

        document.getElementById('preview-copy-rich').addEventListener('click', copyPreviewRich);

        function getCaretFraction() {
            const line  = editor.value.substring(0, editor.selectionStart).split('\n').length;
            const total = editor.value.split('\n').length;
            return (line - 1) / Math.max(total - 1, 1);
        }

        function enterZenMode() {
            document.body.classList.add('writer-zen');
            document.body.classList.remove('reader-zen');
            dualModeBtn.innerHTML = '<i data-lucide="columns-2"></i>';
            lucide.createIcons({ nodes: [dualModeBtn] });
            dualModeBtn.classList.remove('active');
            readerZenBtn.classList.remove('active');
            localStorage.setItem('viewerMode', 'zen');
            editor.focus();
        }

        function enterDualMode() {
            document.body.classList.remove('writer-zen', 'reader-zen');
            dualModeBtn.innerHTML = '<i data-lucide="columns-2"></i>';
            lucide.createIcons({ nodes: [dualModeBtn] });
            dualModeBtn.classList.add('active');
            readerZenBtn.classList.remove('active');
            localStorage.setItem('viewerMode', 'dual');
        }

        dualModeBtn.addEventListener('click', () => {
            if (document.body.classList.contains('writer-zen')) {
                enterDualMode();
            } else {
                enterZenMode();
            }
        });

        readerZenBtn.addEventListener('click', () => {
            const entering = !document.body.classList.contains('reader-zen');
            document.body.classList.remove('writer-zen');
            document.body.classList.toggle('reader-zen');
            readerZenBtn.classList.toggle('active', entering);
            dualModeBtn.classList.remove('active');
            if (!entering) enterZenMode();
        });

        zenReaderExit.addEventListener('click', exitReaderZen);

        mobileEditorBtn.addEventListener('click', () => {
            document.body.classList.remove('mobile-preview');
            mobileEditorBtn.classList.add('active');
            mobilePreviewBtn.classList.remove('active');
        });

        mobilePreviewBtn.addEventListener('click', () => {
            document.body.classList.add('mobile-preview');
            mobilePreviewBtn.classList.add('active');
            mobileEditorBtn.classList.remove('active');
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') exitReaderZen();
        });

        function exitReaderZen() {
            if (document.body.classList.contains('reader-zen')) {
                enterZenMode();
            }
        }

        window.addEventListener('resize', () => {
            if (window.innerWidth < 768 && !document.body.classList.contains('reader-zen')) {
                enterZenMode();
            }
        });

        function updateCaretIndicator() {
            const tokens = marked.lexer(editor.value).filter(t => t.type !== 'space');
            const children = Array.from(preview.children);
            if (tokens.length === 0 || children.length === 0) {
                caretIndicator.style.display = 'none';
                return;
            }

            const caretPos = editor.selectionStart;
            let offset = 0, tokenIndex = 0;
            for (let i = 0; i < tokens.length; i++) {
                tokenIndex = i;
                offset += tokens[i].raw.length;
                if (offset > caretPos) break;
            }

            const targetEl = children[Math.min(tokenIndex, children.length - 1)];
            const wrapperRect = previewWrapper.getBoundingClientRect();
            const targetRect  = targetEl.getBoundingClientRect();
            const previewRect = preview.getBoundingClientRect();

            caretIndicator.style.top   = (targetRect.top - wrapperRect.top + previewWrapper.scrollTop) + 'px';
            caretIndicator.style.left  = (previewRect.left - wrapperRect.left) + 'px';
            caretIndicator.style.width = previewRect.width + 'px';
            caretIndicator.style.display = 'flex';
        }

        document.addEventListener('selectionchange', () => {
            if (document.activeElement === editor) updateCaretIndicator();
        });

        function renderMarkdown() {
            preview.innerHTML = marked.parse(editor.value);
            document.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);

                const pre = block.parentElement;
                const wrapper = document.createElement('div');
                wrapper.className = 'code-block-wrapper';
                pre.parentElement.insertBefore(wrapper, pre);
                wrapper.appendChild(pre);

                const btn = document.createElement('button');
                btn.className = 'copy-code-btn';
                btn.innerHTML = '<i data-lucide="copy"></i>';
                btn.addEventListener('click', () => {
                    navigator.clipboard.writeText(block.innerText).then(() => {
                        btn.innerHTML = '<i data-lucide="check"></i>';
                        lucide.createIcons({ nodes: [btn] });
                        setTimeout(() => {
                            btn.innerHTML = '<i data-lucide="copy"></i>';
                            lucide.createIcons({ nodes: [btn] });
                        }, 1500);
                    });
                });
                wrapper.appendChild(btn);
                lucide.createIcons({ nodes: [btn] });
            });
            if (window.MathJax?.typesetPromise) {
                MathJax.typesetPromise([preview]).then(updateCaretIndicator);
            } else {
                updateCaretIndicator();
            }
        }

        function updateWordCount() {
            const text = editor.value.trim();
            const words = text ? text.split(/\s+/).length : 0;
            wordCount.textContent = `${words.toLocaleString()} word${words !== 1 ? 's' : ''}`;
        }

        function copyHtml() {
            navigator.clipboard.writeText(getFullHtml())
                .then(() => alert('HTML copied to clipboard!'))
                .catch(err => console.error('Error copying HTML:', err));
        }

        function copyPreviewRich() {
            const btn = document.getElementById('preview-copy-rich');
            const clone = preview.cloneNode(true);

            // Replace MathJax-rendered containers with original LaTeX so rich editors don't mangle them
            const mathItems = window.MathJax?.startup?.document?.math;
            if (mathItems) {
                const containers = Array.from(clone.querySelectorAll('mjx-container'));
                Array.from(mathItems).forEach((item, i) => {
                    if (containers[i]) {
                        const [open, close] = item.display ? ['\\[', '\\]'] : ['\\(', '\\)'];
                        containers[i].replaceWith(document.createTextNode(`${open}${item.math}${close}`));
                    }
                });
            }

            const clipItem = new ClipboardItem({
                'text/html':  new Blob([clone.innerHTML],   { type: 'text/html' }),
                'text/plain': new Blob([preview.innerText], { type: 'text/plain' }),
            });
            navigator.clipboard.write([clipItem]).then(() => {
                btn.innerHTML = '<i data-lucide="check"></i>';
                lucide.createIcons({ nodes: [btn] });
                setTimeout(() => {
                    btn.innerHTML = '<i data-lucide="clipboard"></i>';
                    lucide.createIcons({ nodes: [btn] });
                }, 1500);
            }).catch(err => console.error('Copy failed:', err));
        }

        function downloadHtml() {
            const blob = new Blob([getFullHtml()], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${currentDocument || 'markdown-export'}.html`;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 0);
        }

        function clearEditor() {
            if (confirm('Are you sure you want to clear the editor?')) {
                editor.value = '';
                renderMarkdown();
                updateWordCount();
                showUnsavedChanges();
            }
        }

        documentNameInput.addEventListener('input', () => {
            const empty = !documentNameInput.value.trim();
            saveBtn.disabled = empty;
            loadBtn.disabled = empty;
            deleteBtn.disabled = empty;
        });

        function resetPanelInput() {
            documentNameInput.value = '';
            saveBtn.disabled = true;
            loadBtn.disabled = true;
            deleteBtn.disabled = true;
        }

        function saveDocument() {
            const name = documentNameInput.value.trim();
            if (!name) return;
            saveDocumentContent(name, editor.value);
            currentDocument = name;
            updateDocIndicator();
            resetPanelInput();
            showSaved();
        }

        function loadDocument() {
            const name = documentNameInput.value.trim();
            if (!name) return;
            const content = localStorage.getItem(`markdown_${name}`);
            if (content === null) { alert(`Document "${name}" not found`); return; }
            editor.value = content;
            currentDocument = name;
            updateDocIndicator();
            renderMarkdown();
            updateWordCount();
            resetPanelInput();
            showSaved();
        }

        function deleteDocument() {
            const name = documentNameInput.value.trim();
            if (!name) return;
            if (confirm(`Are you sure you want to delete "${name}"?`)) {
                localStorage.removeItem(`markdown_${name}`);
                if (currentDocument === name) currentDocument = null;
                updateDocIndicator();
                resetPanelInput();
            }
        }

        function saveDocumentContent(name, content) {
            localStorage.setItem(`markdown_${name}`, content);
        }

        function initDocument() {
            const saved = localStorage.getItem('editor_autosave');
            if (saved !== null) editor.value = saved;
        }

        function updateFileList() {
            fileList.innerHTML = '';
            const documents = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('markdown_')) documents.push(key.substring(9));
            }

            if (documents.length === 0) {
                const empty = document.createElement('span');
                empty.style.cssText = 'font-size:11px;color:var(--text-muted)';
                empty.textContent = 'No saved documents';
                fileList.appendChild(empty);
                return;
            }

            documents.sort().forEach(name => {
                const chip = document.createElement('div');
                chip.className = 'file-chip';

                const loadA = document.createElement('a');
                loadA.className = 'chip-load';
                loadA.textContent = name;
                loadA.addEventListener('click', (e) => {
                    e.preventDefault();
                    documentNameInput.value = name;
                    loadDocument();
                });

                const delA = document.createElement('a');
                delA.className = 'chip-del';
                delA.innerHTML = '<i data-lucide="x"></i>';
                delA.addEventListener('click', (e) => {
                    e.preventDefault();
                    documentNameInput.value = name;
                    deleteDocument();
                });

                chip.appendChild(loadA);
                chip.appendChild(delA);
                fileList.appendChild(chip);
            });
            lucide.createIcons({ nodes: Array.from(fileList.querySelectorAll('[data-lucide]')) });
        }

        const hljsTheme = document.getElementById('hljs-theme');
        const HLJS_DARK  = 'https://unpkg.com/@catppuccin/highlightjs/css/catppuccin-mocha.css';
        const HLJS_LIGHT = 'https://unpkg.com/@catppuccin/highlightjs/css/catppuccin-latte.css';

        function setThemeIcon(dark) {
            themeIconWrap.innerHTML = `<i data-lucide="${dark ? 'sun' : 'moon'}"></i>`;
            lucide.createIcons({ nodes: [themeIconWrap] });
        }

        function applyTheme(dark) {
            setThemeIcon(dark);
            hljsTheme.href = dark ? HLJS_DARK : HLJS_LIGHT;
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            const dark = document.body.classList.contains('dark-theme');
            applyTheme(dark);
            localStorage.setItem('dark_theme', dark ? 'true' : 'false');
        }

        function updateDocIndicator() {
            if (currentDocument) {
                saveToDocLabel.textContent = `Save to ${currentDocument}?`;
                saveToDocBtn.style.display = '';
                lucide.createIcons({ nodes: [saveToDocBtn] });
            } else {
                saveToDocBtn.style.display = 'none';
            }
            updateFileList();
        }

        function showUnsavedChanges() {
            saveIndicator.textContent = 'unsaved';
            saveIndicator.classList.add('unsaved');
        }

        function showSaved() {
            saveIndicator.textContent = 'saved';
            saveIndicator.classList.remove('unsaved');
        }

        function getFullHtml() {
            return `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${currentDocument || 'Markdown Export'}</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.78;
            color: #1a1a1a;
            max-width: 700px;
            margin: 0 auto;
            padding: 40px 28px 80px;
            font-size: 16px;
        }
        h1, h2 { border-bottom: 1px solid #e2e2e2; padding-bottom: 0.3em; }
        code {
            background: rgba(0,0,0,0.05);
            padding: 0.15em 0.4em;
            border-radius: 4px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Consolas', monospace;
            font-size: 0.85em;
        }
        pre {
            background: #f4f4f4;
            border: 1px solid #e2e2e2;
            border-radius: 6px;
            padding: 14px 16px;
            overflow: auto;
        }
        pre code { background: none; padding: 0; }
        blockquote {
            padding: 4px 16px;
            color: #999;
            border-left: 3px solid #e2e2e2;
            margin: 1em 0;
        }
        table { border-collapse: collapse; width: 100%; margin: 1em 0; }
        table th, table td { padding: 7px 12px; border: 1px solid #e2e2e2; text-align: left; }
        table th { background: #f4f4f4; font-weight: 600; }
        table tr:nth-child(2n) td { background: #f9f9f9; }
        img { max-width: 100%; border-radius: 4px; }
    </style>
    <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(', '\\)']], displayMath: [['\\[', '\\]']] }
    };
    <\/script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async><\/script>
</head>
<body>
${preview.innerHTML}
</body>
</html>`;
        }

        lucide.createIcons();
        updateDocIndicator();

        // Load saved theme, fall back to system preference
        const savedTheme = localStorage.getItem('dark_theme');
        const prefersDark = savedTheme !== null ? savedTheme === 'true' : window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (!prefersDark) {
            document.body.classList.remove('dark-theme');
        }
        applyTheme(prefersDark);
    </script>
</body>
</html>
