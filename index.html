<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Markdown Viewer</title>
    <meta name="description" content="A clean Markdown viewer designed for comfortable, focused reading and effortless editing.">
    <meta property="og:title" content="Simple Markdown Viewer">
    <meta property="og:description" content="A clean Markdown viewer designed for comfortable, focused reading and effortless editing.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Simple Markdown Viewer">
    <meta name="twitter:description" content="A clean Markdown viewer designed for comfortable, focused reading and effortless editing.">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <link id="hljs-theme" rel="stylesheet" href="https://unpkg.com/@catppuccin/highlightjs/css/catppuccin-mocha.css">
    <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)']],
        displayMath: [['\\[', '\\]']]
      },
      startup: {
        typeset: false,
        ready() {
          MathJax.startup.defaultReady();
          const p = document.getElementById('preview');
          if (p) MathJax.typesetPromise([p]);
        }
      }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        svg.lucide { display: inline-block; vertical-align: middle; stroke-width: 2; }
        .pane-actions svg.lucide { width: 14px; height: 14px; }
        .tools-handle svg.lucide { width: 13px; height: 13px; }
        .chip-del svg.lucide { width: 10px; height: 10px; }
        #theme-toggle svg.lucide, #dual-mode-btn svg.lucide { width: 15px; height: 15px; }

        :root {
            --bg: #f4f4f4;
            --surface: #ffffff;
            --border: #e2e2e2;
            --text: #1a1a1a;
            --text-muted: #a0a0a0;
            --accent: #89b4fa;
            --danger: #e07b54;
            --topbar-h: 44px;
            --bottombar-h: 48px;
            --label-h: 30px;
        }

        body.dark-theme {
            --bg: #1c1c1e;
            --surface: #28282a;
            --border: #3c3c3e;
            --text: #ebebf0;
            --text-muted: #7c7c80;
            --accent: #89b4fa;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Topbar ── */
        .topbar {
            height: var(--topbar-h);
            display: flex;
            align-items: center;
            padding: 0 14px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            gap: 10px;
            transition: background 0.2s, border-color 0.2s;
        }

        .app-title {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: var(--text);
        }

        .save-indicator {
            font-size: 11px;
            color: var(--text-muted);
            transition: color 0.2s;
        }

        .save-indicator.unsaved { color: var(--danger); }

        .topbar-spacer { flex: 1; }

        .topbar-actions { display: flex; gap: 6px; }

        /* ── Buttons ── */
        button {
            padding: 5px 11px;
            font-size: 12px;
            font-family: inherit;
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
            white-space: nowrap;
            line-height: 1.4;
        }

        button:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        button.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        button.active:hover {
            opacity: 0.85;
            color: #fff;
        }

        /* ── Main split pane ── */
        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        .pane-label {
            height: var(--label-h);
            padding: 0 14px;
            display: flex;
            align-items: center;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.09em;
            color: var(--text-muted);
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            transition: background 0.2s, border-color 0.2s;
        }

        .pane-actions {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-group {
            display: flex;
            gap: 3px;
        }

        .pane-actions button, #toc-btn {
            padding: 2px 7px;
            font-size: 13px;
            line-height: 1;
            border-radius: 5px;
        }

        .split-divider {
            width: 1px;
            background: var(--border);
            flex-shrink: 0;
            transition: background 0.2s;
        }

        /* ── Editor ── */
        #editor {
            flex: 1;
            padding: 18px 20px;
            border: none;
            resize: none;
            outline: none;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.7;
            background: var(--surface);
            color: var(--text);
            overflow: auto;
            transition: background 0.2s, color 0.2s;
        }

        #editor::placeholder { color: var(--text-muted); }

        /* ── Preview ── */
        #preview-wrapper {
            flex: 1;
            overflow: auto;
            background: var(--surface);
            transition: background 0.2s;
            position: relative;
        }

        #caret-indicator {
            position: absolute;
            display: none;
            align-items: center;
            gap: 6px;
            pointer-events: none;
            z-index: 5;
            transform: translateY(-50%);
        }

        .caret-label {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: #fff;
            background: var(--accent);
            padding: 2px 7px;
            border-radius: 3px;
            white-space: nowrap;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .caret-line {
            flex: 1;
            height: 1.5px;
            background: var(--accent);
            opacity: 0.5;
        }

        #preview {
            max-width: 700px;
            margin: 0 auto;
            padding: 28px 28px 48px;
            font-size: 15px;
            line-height: 1.78;
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        #preview h1, #preview h2, #preview h3,
        #preview h4, #preview h5, #preview h6 {
            margin-top: 1.4em;
            margin-bottom: 0.5em;
            font-weight: 600;
            line-height: 1.3;
            color: var(--text);
        }

        #preview h1, #preview h2 {
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.3em;
        }

        #preview h1 { font-size: 1.7em; }
        #preview h2 { font-size: 1.3em; }
        #preview h3 { font-size: 1.1em; }

        #preview p { margin: 0.7em 0; }

        #preview a { color: var(--accent); text-decoration: none; }
        #preview a:hover { text-decoration: underline; }

        #preview code {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Consolas', monospace;
            font-size: 0.84em;
        }

        #preview :not(pre) > code {
            background: rgba(0, 0, 0, 0.06);
            padding: 0.15em 0.4em;
            border-radius: 4px;
        }

        body.dark-theme #preview :not(pre) > code { background: rgba(255, 255, 255, 0.08); }

        #preview pre {
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: auto;
            margin: 0;
        }

        .code-block-wrapper {
            position: relative;
            margin: 1em 0;
        }

        .copy-code-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 4px 6px;
            font-size: 11px;
            line-height: 1;
            background: rgba(0, 0, 0, 0.25);
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.15s, background 0.15s;
            backdrop-filter: blur(4px);
        }

        .copy-code-btn svg.lucide { width: 12px; height: 12px; }
        .code-block-wrapper:hover .copy-code-btn { opacity: 1; }
        .copy-code-btn:hover { background: rgba(0, 0, 0, 0.5); color: #fff; border-color: transparent; }

        #preview pre code.hljs { display: block; min-width: max-content; border-radius: 5px; font-size: 0.875em; padding: 14px 16px; background: var(--bg) !important; }

        #preview blockquote {
            margin: 1em 0;
            padding: 4px 16px;
            color: var(--text-muted);
            border-left: 3px solid var(--border);
        }

        #preview table {
            border-collapse: collapse;
            width: 100%;
            margin: 1em 0;
            font-size: 0.9em;
        }

        #preview table th, #preview table td {
            padding: 7px 12px;
            border: 1px solid var(--border);
            text-align: left;
        }

        #preview table th {
            background: var(--bg);
            font-weight: 600;
        }

        #preview table tr:nth-child(2n) td { background: var(--bg); }

        #preview img { max-width: 100%; border-radius: 4px; }

        #preview hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 2em 0;
        }

        #preview ul, #preview ol { padding-left: 1.6em; margin: 0.6em 0; }
        #preview li { margin: 0.2em 0; }

        /* ── Tools drawer ── */
        .tools-handle {
            width: 100%;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            font-size: 11px;
            font-family: inherit;
            color: var(--text-muted);
            background: var(--bg);
            border: none;
            border-top: 1px solid var(--border);
            cursor: pointer;
            flex-shrink: 0;
            transition: color 0.15s, background 0.15s, border-color 0.2s;
            letter-spacing: 0.04em;
        }

        .tools-handle:hover { color: var(--accent); background: var(--surface); }

        .tools-drawer {
            overflow: hidden;
            max-height: 300px;
            transition: max-height 0.25s ease;
            flex-shrink: 0;
        }

        .tools-drawer.collapsed { max-height: 0; }
        .tools-drawer.no-transition { transition: none; }

        /* ── Bottom bar ── */
        .bottombar {
            height: var(--bottombar-h);
            display: flex;
            align-items: center;
            padding: 0 14px;
            gap: 6px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            transition: background 0.2s, border-color 0.2s;
        }

        .word-count {
            font-size: 11px;
            color: var(--text-muted);
            margin-left: auto;
        }

        /* ── File panel ── */
        .file-panel {
            background: var(--bg);
            border-top: 1px solid var(--border);
            padding: 10px 14px;
            flex-shrink: 0;
            transition: background 0.2s, border-color 0.2s;
        }

        .file-panel-row {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .file-panel-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.09em;
            color: var(--text-muted);
            margin-right: 2px;
            white-space: nowrap;
        }

        .file-panel input[type="text"] {
            padding: 4px 10px;
            font-size: 12px;
            font-family: inherit;
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 6px;
            outline: none;
            width: 160px;
            transition: border-color 0.15s;
        }

        .file-panel input[type="text"]:focus { border-color: var(--accent); }

        .file-list {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 8px;
        }

        .file-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px 3px 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 11.5px;
            color: var(--text);
        }

        .file-chip .chip-load {
            cursor: pointer;
            color: var(--text);
            text-decoration: none;
        }

        .file-chip .chip-load:hover { color: var(--accent); }

        .file-chip .chip-del {
            cursor: pointer;
            color: var(--text-muted);
            font-size: 10px;
            line-height: 1;
            text-decoration: none;
        }

        .file-chip .chip-del:hover { color: var(--danger); }

        button:disabled { opacity: 0.38; cursor: not-allowed; }
        button:disabled:hover { border-color: var(--border); color: var(--text); }

        #save-to-doc svg.lucide { width: 12px; height: 12px; }

        .btn-separator { width: 1px; background: var(--border); align-self: stretch; margin: 2px 1px; }
        #zen-reader-exit, .btn-separator:has(+ #zen-reader-exit) { display: none; }
        body.reader-zen #zen-reader-exit { display: inline-flex; }
        body.reader-zen .btn-separator:has(+ #zen-reader-exit) { display: block; }

        @media (max-width: 768px) {
            .preview-pane, .split-divider { display: none !important; }
            #dual-mode-btn { display: none; }
            body.reader-zen .preview-pane { display: flex !important; }
            body.reader-zen .editor-pane  { display: none !important; }
        }

        /* ── TOC ── */
        #toc-btn { margin-left: 8px; display: inline-flex; align-items: center; gap: 4px; padding: 1px 5px; font-size: 11px; }
        #toc-btn svg.lucide { width: 14px; height: 14px; }

        #toc-panel {
            position: fixed;
            top: 45px;
            left: 20px;
            width: 350px;
            max-height: 70%;
            z-index: 998;
            background: color-mix(in srgb, var(--surface) 80%, transparent);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 10px;
            box-shadow: 0 8px 28px rgba(0,0,0,0.18);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            opacity: 0;
            transform: translateY(-6px) scale(0.97);
            pointer-events: none;
            transition: opacity 0.15s ease, transform 0.15s ease;
        }

        #toc-panel.open {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        #toc-list {
            overflow-y: auto;
            padding: 6px 0;
        }

        .toc-item {
            display: flex;
            align-items: baseline;
            gap: 8px;
            padding: 5px 14px;
            font-size: 12.5px;
            color: var(--text);
            text-decoration: none;
            cursor: pointer;
            border-left: 2px solid transparent;
            transition: color 0.12s, border-color 0.12s, background 0.12s;
            line-height: 1.4;
        }

        .toc-item span:last-child {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
        }

        .toc-item:hover { color: var(--accent); background: var(--bg); }
        .toc-item.active { color: var(--accent); border-left-color: var(--accent); }

        .toc-item[data-level="2"] { padding-left: 24px; }
        .toc-item[data-level="3"] { padding-left: 34px; font-size: 12px; }
        .toc-item[data-level="4"],
        .toc-item[data-level="5"],
        .toc-item[data-level="6"] { padding-left: 44px; font-size: 11.5px; }

        .toc-empty {
            padding: 12px 14px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .toc-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-muted);
            width: 18px;
            flex-shrink: 0;
            letter-spacing: 0.01em;
        }


        @keyframes spotlight-fade {
            0%   { background-color: rgba(137, 180, 250, 0.22); }
            18%  { background-color: rgba(137, 180, 250, 0.22); }
            100% { background-color: transparent; }
        }

        .spotlight {
            border-radius: 4px;
            animation: spotlight-fade 1.6s ease-out forwards;
        }

        #editor-spotlight {
            position: fixed;
            pointer-events: none;
            border-radius: 3px;
            z-index: 10;
        }

        #editor-spotlight.active {
            animation: spotlight-fade 1.6s ease-out forwards;
        }

        /* ── Writer Zen ── */
        body.writer-zen .preview-pane,
        body.writer-zen .split-divider {
            display: none !important;
        }

        body.writer-zen .editor-pane { background: var(--surface); }

        body.writer-zen #editor {
            width: 100%;
            padding-top: 72px;
            padding-bottom: 48px;
            padding-inline: max(28px, calc((100% - 644px) / 2));
            font-size: 14.5px;
            line-height: 1.85;
        }

        /* ── Preview ── */
        body.reader-zen .editor-pane,
        body.reader-zen .split-divider,
        body.reader-zen .tools-handle,
        body.reader-zen .tools-drawer,
        body.reader-zen .topbar {
            display: none !important;
        }

        body.reader-zen .main { height: 100vh; }

        body.reader-zen #preview-wrapper { background: var(--surface); }
        body.reader-zen #preview-sync-caret { display: none !important; }
        body.reader-zen #caret-indicator { display: none !important; }

        body.reader-zen #preview {
            padding: 64px 32px 80px;
            font-size: 17px;
            line-height: 1.85;
        }


    </style>
</head>

    <div id="editor-spotlight"></div>
    <div id="toc-panel">
        <div id="toc-list"></div>
    </div>

    <header class="topbar">
        <span class="app-title">Markdown Viewer</span>
        <span class="save-indicator" id="save-indicator">saved</span>
        <div class="topbar-spacer"></div>
        <div class="topbar-actions">
            <button id="dual-mode-btn" title="Toggle split view (available at desktop)"><i data-lucide="columns-2"></i></button>
            <button id="reader-zen-btn" title="Distraction-free reading (Esc to exit)">Preview</button>
            <button id="theme-toggle" title="Toggle theme"><span id="theme-icon-wrap"><i data-lucide="moon"></i></span></button>
        </div>
    </header>

    <main class="main">
        <div class="pane editor-pane">
            <div class="pane-label">Editor
                <div class="pane-actions">
                    <div class="btn-group">
                        <button id="editor-scroll-top"   title="Go to top"><i data-lucide="chevrons-up"></i></button>
                        <button id="editor-scroll-caret" title="Go to text cursor"><i data-lucide="text-cursor"></i></button>
                    </div>
                </div>
            </div>

        </div>
        <div class="split-divider"></div>
        <div class="pane preview-pane">
            <div class="pane-label">Preview
                <button id="toc-btn" title="Table of contents"><i data-lucide="list"></i> Table of Content</button>
                <div class="pane-actions">
                    <div class="btn-group">
                        <button id="preview-scroll-top"  title="Go to top"><i data-lucide="chevrons-up"></i></button>
                        <button id="preview-sync-caret"  title="Go to editor cursor"><i data-lucide="file-input"></i></button>
                        <button id="preview-copy-rich"   title="Copy preview to clipboard"><i data-lucide="clipboard"></i></button>
                        <div class="btn-separator"></div>

                    </div>
                </div>
            </div>

                <div id="caret-indicator"><span class="caret-label">You are here</span><span class="caret-line"></span></div>
                <div id="preview"></div>

        </div>
    </main>

    <button class="tools-handle" id="tools-handle"><span id="tools-caret-wrap"><i data-lucide="chevron-down"></i></span> Tools</button>
    <div class="tools-drawer" id="tools-drawer">
        <footer class="bottombar">
            <button id="copy-html">Copy HTML</button>
            <button id="download-html">Download</button>
            <button id="clear">Clear</button>
            <span class="word-count" id="word-count">0 words</span>
        </footer>

        <div class="file-panel">
            <div class="file-panel-row">
                <span class="file-panel-label">Documents</span>
                <input type="text" id="document-name" placeholder="Document name">
                <button id="save-document" disabled>Save</button>
                <button id="load-document" disabled>Load</button>
                <button id="delete-document" disabled>Delete</button>
                <button id="save-to-doc" style="display:none"><i data-lucide="save"></i> <span id="save-to-doc-label"></span></button>
            </div>
            <div class="file-list" id="file-list"></div>

    <script>
        function prettifyMathText(s) {
            return s
                // Greek lowercase
                .replace(/\\alpha/g,'α').replace(/\\beta/g,'β').replace(/\\gamma/g,'γ')
                .replace(/\\delta/g,'δ').replace(/\\varepsilon/g,'ε').replace(/\\epsilon/g,'ε')
                .replace(/\\zeta/g,'ζ').replace(/\\eta/g,'η').replace(/\\vartheta/g,'ϑ')
                .replace(/\\theta/g,'θ').replace(/\\iota/g,'ι').replace(/\\kappa/g,'κ')
                .replace(/\\lambda/g,'λ').replace(/\\mu/g,'μ').replace(/\\nu/g,'ν')
                .replace(/\\xi/g,'ξ').replace(/\\varpi/g,'ϖ').replace(/\\pi/g,'π')
                .replace(/\\varrho/g,'ϱ').replace(/\\rho/g,'ρ').replace(/\\sigma/g,'σ')
                .replace(/\\tau/g,'τ').replace(/\\upsilon/g,'υ').replace(/\\varphi/g,'φ')
                .replace(/\\phi/g,'φ').replace(/\\chi/g,'χ').replace(/\\psi/g,'ψ')
                .replace(/\\omega/g,'ω')
                // Greek uppercase
                .replace(/\\Gamma/g,'Γ').replace(/\\Delta/g,'Δ').replace(/\\Theta/g,'Θ')
                .replace(/\\Lambda/g,'Λ').replace(/\\Xi/g,'Ξ').replace(/\\Pi/g,'Π')
                .replace(/\\Sigma/g,'Σ').replace(/\\Upsilon/g,'Υ').replace(/\\Phi/g,'Φ')
                .replace(/\\Psi/g,'Ψ').replace(/\\Omega/g,'Ω')
                // Blackboard bold
                .replace(/\\mathbb\{R\}/g,'ℝ').replace(/\\mathbb\{N\}/g,'ℕ')
                .replace(/\\mathbb\{Z\}/g,'ℤ').replace(/\\mathbb\{Q\}/g,'ℚ')
                .replace(/\\mathbb\{C\}/g,'ℂ')
                // Relations
                .replace(/\\leq/g,'≤').replace(/\\geq/g,'≥').replace(/\\neq/g,'≠')
                .replace(/\\approx/g,'≈').replace(/\\equiv/g,'≡').replace(/\\sim/g,'∼')
                .replace(/\\propto/g,'∝').replace(/\\ll/g,'≪').replace(/\\gg/g,'≫')
                // Operators
                .replace(/\\times/g,'×').replace(/\\cdot/g,'·').replace(/\\pm/g,'±')
                .replace(/\\mp/g,'∓').replace(/\\div/g,'÷')
                // Arrows
                .replace(/\\leftrightarrow/g,'↔').replace(/\\Leftrightarrow/g,'⟺')
                .replace(/\\Rightarrow/g,'⇒').replace(/\\Leftarrow/g,'⇐')
                .replace(/\\rightarrow/g,'→').replace(/\\leftarrow/g,'←').replace(/\\to/g,'→')
                // Sets / logic
                .replace(/\\notin/g,'∉').replace(/\\in/g,'∈')
                .replace(/\\subseteq/g,'⊆').replace(/\\supseteq/g,'⊇')
                .replace(/\\subset/g,'⊂').replace(/\\supset/g,'⊃')
                .replace(/\\cup/g,'∪').replace(/\\cap/g,'∩')
                .replace(/\\forall/g,'∀').replace(/\\exists/g,'∃').replace(/\\emptyset/g,'∅')
                // Misc
                .replace(/\\infty/g,'∞').replace(/\\partial/g,'∂').replace(/\\nabla/g,'∇')
                .replace(/\\sum/g,'∑').replace(/\\prod/g,'∏').replace(/\\int/g,'∫');
        }

        function tocLabelFromHeading(raw) {
            let s = raw
                .replace(/<[^>]+>/g, '')
                .replace(/\\\[[\s\S]*?\\\]/g, m => m.slice(2, -2))
                .replace(/\\\(.*?\\\)/g, m => m.slice(2, -2));
            s = prettifyMathText(s);
            return s
                .replace(/\\frac\{([^}]+)\}\{([^}]+)\}/g, '($1)/($2)')
                .replace(/\\sqrt\{([^}]+)\}/g, '√($1)')
                .replace(/\\sqrt\b/g, '√')
                .replace(/\\text\{([^}]+)\}/g, '$1')
                .replace(/\\math(?:bf|rm|it|cal|bb)\{([^}]+)\}/g, '$1')
                .replace(/\\(?:left|right)[\[({|.]/g, '')
                .replace(/\^(?:\{([^}]+)\}|(\S))/g, (_, b, c) => '^' + (b || c))
                .replace(/_(?:\{([^}]+)\}|(\S))/g, (_, b, c) => '_' + (b || c))
                .replace(/[{}]/g, '')
                .replace(/\\/g, '')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function slugify(text) {
            return text.toLowerCase().replace(/[^\w\s-]/g, '').trim().replace(/\s+/g, '-');
        }

        // Custom renderer: add id attrs to headings for TOC anchor links
        const headingRenderer = new marked.Renderer();
        headingRenderer.heading = function(text, level) {
            const id = slugify(text.replace(/<[^>]+>/g, ''));
            return `<h${level} id="${id}">${text}</h${level}>\n`;
        };

        // Protect \[...\] and \(...\) from marked.js backslash-escaping
        marked.use({
            extensions: [{
                name: 'blockMath',
                level: 'block',
                start(src) { return src.indexOf('\\['); },
                tokenizer(src) {
                    const m = src.match(/^\\\[([\s\S]*?)\\\]/);
                    if (m) return { type: 'blockMath', raw: m[0], text: m[1].trim() };
                },
                renderer(token) {
                    return `<p>\\[${token.text}\\]</p>\n`;
                }
            }, {
                name: 'inlineMath',
                level: 'inline',
                start(src) { return src.indexOf('\\('); },
                tokenizer(src) {
                    const m = src.match(/^\\\((.+?)\\\)/);
                    if (m) return { type: 'inlineMath', raw: m[0], text: m[1] };
                },
                renderer(token) {
                    return `\\(${token.text}\\)`;
                }
            }]
        });

        marked.setOptions({
            renderer: headingRenderer,
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true,
            gfm: true
        });

        document.getElementById('editor-scroll-top').addEventListener('click', () => {

        function getCaretTop(textarea) {
            const style = window.getComputedStyle(textarea);
            const mirror = document.createElement('div');
            ['fontFamily','fontSize','fontWeight','fontStyle','lineHeight',
             'letterSpacing','wordWrap','whiteSpace','paddingTop','paddingRight',
             'paddingBottom','paddingLeft','boxSizing'
            ].forEach(p => mirror.style[p] = style[p]);
            mirror.style.position   = 'fixed';
            mirror.style.top        = '0';
            mirror.style.left       = '0';
            mirror.style.width      = textarea.clientWidth + 'px';
            mirror.style.height     = 'auto';
            mirror.style.visibility = 'hidden';
            mirror.style.overflow   = 'hidden';
            mirror.style.zIndex     = '-1';
            mirror.textContent = textarea.value.substring(0, textarea.selectionStart);
            const span = document.createElement('span');
            span.textContent = ' ';
            mirror.appendChild(span);
            document.body.appendChild(mirror);
            const top = span.getBoundingClientRect().top;
            document.body.removeChild(mirror);
            return { top, lineHeight: parseFloat(style.lineHeight) };
        }

        document.getElementById('editor-scroll-caret').addEventListener('click', () => {
            const { top: lineY, lineHeight } = getCaretTop(editor);

            editor.scrollTop = Math.max(0, lineY - editor.clientHeight / 2 + lineHeight / 2);
            editor.focus();

            const editorRect = editor.getBoundingClientRect();
            const spotlight = document.getElementById('editor-spotlight');
            spotlight.style.top    = (editorRect.top + lineY - editor.scrollTop - 7) + 'px';
            spotlight.style.left   = editorRect.left + 'px';
            spotlight.style.width  = editorRect.width + 'px';
            spotlight.style.height = lineHeight + 'px';

            spotlight.classList.remove('active');
            void spotlight.offsetWidth;
            spotlight.classList.add('active');
            spotlight.addEventListener('animationend', () => spotlight.classList.remove('active'), { once: true });
        });

        document.getElementById('preview-scroll-top').addEventListener('click', () => {
            previewWrapper.scrollTop = 0;
        });

        document.getElementById('preview-sync-caret').addEventListener('click', () => {
            const tokens = marked.lexer(editor.value).filter(t => t.type !== 'space');
            const caretPos = editor.selectionStart;
            let offset = 0, tokenIndex = 0;
            for (let i = 0; i < tokens.length; i++) {
                tokenIndex = i;
                offset += tokens[i].raw.length;
                if (offset > caretPos) break;
            }
            const targetEl = preview.querySelector(`[data-token-index="${tokenIndex}"]`);
            if (!targetEl) return;

            targetEl.scrollIntoView({ behavior: 'smooth', block: 'center' });

            targetEl.classList.remove('spotlight');
            void targetEl.offsetWidth;
            targetEl.classList.add('spotlight');
            targetEl.addEventListener('animationend', () => targetEl.classList.remove('spotlight'), { once: true });
        });

        document.getElementById('preview-copy-rich').addEventListener('click', copyPreviewRich);

        function getCaretFraction() {
            const line  = editor.value.substring(0, editor.selectionStart).split('\n').length;
            const total = editor.value.split('\n').length;
            return (line - 1) / Math.max(total - 1, 1);
        }

        function enterZenMode() {
            document.body.classList.add('writer-zen');
            document.body.classList.remove('reader-zen');
            dualModeBtn.innerHTML = '<i data-lucide="columns-2"></i>';

            dualModeBtn.classList.remove('active');

            document.body.classList.remove('writer-zen');
            document.body.classList.toggle('reader-zen');
            readerZenBtn.classList.toggle('active', entering);
            dualModeBtn.classList.remove('active');
            if (!entering) enterZenMode();
        });

        document.addEventListener('keydown', (e) => {

        function exitReaderZen() {
            if (document.body.classList.contains('reader-zen')) {

        function openToc() {
            tocPanel.classList.add('open');
            tocBtn.classList.add('active');
        }

        function closeToc() {
            tocPanel.classList.remove('open');
            tocBtn.classList.remove('active');

        function buildToc() {
            const tokens = marked.lexer(editor.value);
            const headings = tokens.filter(t => t.type === 'heading');
            tocList.innerHTML = '';

            if (headings.length === 0) {
                const msg = document.createElement('div');
                msg.className = 'toc-empty';
                msg.textContent = 'No headings found';
                tocList.appendChild(msg);
                return;
            }

            headings.forEach(h => {
                const text = tocLabelFromHeading(h.text);
                const id = slugify(text);
                const item = document.createElement('a');
                item.className = 'toc-item';
                item.dataset.level = h.depth;

                const label = document.createElement('span');
                label.className = 'toc-label';
                label.textContent = `h${h.depth}`;

                const title = document.createElement('span');
                title.textContent = text;

                item.appendChild(label);
                item.appendChild(title);
                item.addEventListener('click', () => {
                    const target = document.getElementById(id);
                    if (target) {
                        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        highlightActiveTocItem(item);
                    }
                    closeToc();
                });
                tocList.appendChild(item);
            });
        }

        function highlightActiveTocItem(active) {
            tocList.querySelectorAll('.toc-item').forEach(el => el.classList.remove('active'));
            if (active) active.classList.add('active');
        }

        function scrollspy() {
            const headingEls = Array.from(preview.querySelectorAll('h1,h2,h3,h4,h5,h6'));
            if (!headingEls.length) return;

            const wrapperTop = previewWrapper.getBoundingClientRect().top;
            let active = headingEls[0];
            for (const el of headingEls) {
                if (el.getBoundingClientRect().top - wrapperTop <= 16) active = el;
                else break;
            }

            const items = Array.from(tocList.querySelectorAll('.toc-item'));
            const match = items.find(item => slugify(item.querySelector('span:last-child').textContent) === active.id);
            highlightActiveTocItem(match || null);
        }

        previewWrapper.addEventListener('scroll', scrollspy, { passive: true });

        window.addEventListener('resize', () => {
            if (window.innerWidth <= 768 && dualModeBtn.classList.contains('active')) {
                enterZenMode();
            }
        });

        function updateCaretIndicator() {
            const tokens = marked.lexer(editor.value).filter(t => t.type !== 'space');
            const children = Array.from(preview.children);
            if (tokens.length === 0 || children.length === 0) {
                caretIndicator.style.display = 'none';
                return;
            }

            const caretPos = editor.selectionStart;
            let offset = 0, tokenIndex = 0;
            for (let i = 0; i < tokens.length; i++) {
                tokenIndex = i;
                offset += tokens[i].raw.length;
                if (offset > caretPos) break;
            }

            const targetEl = preview.querySelector(`[data-token-index="${tokenIndex}"]`)
                         || preview.querySelector(`[data-token-index]`);
            const wrapperRect = previewWrapper.getBoundingClientRect();
            const targetRect  = targetEl.getBoundingClientRect();
            const previewRect = preview.getBoundingClientRect();

            caretIndicator.style.top   = (targetRect.top - wrapperRect.top + previewWrapper.scrollTop) + 'px';
            caretIndicator.style.left  = (previewRect.left - wrapperRect.left) + 'px';
            caretIndicator.style.width = previewRect.width + 'px';
            caretIndicator.style.display = 'flex';
        }

        document.addEventListener('selectionchange', () => {
            if (document.activeElement === editor) updateCaretIndicator();
        });

        function renderMarkdown() {
            preview.innerHTML = marked.parse(editor.value);
            Array.from(preview.children).forEach((el, i) => el.dataset.tokenIndex = i);
            document.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);

                const pre = block.parentElement;
                const wrapper = document.createElement('div');
                wrapper.className = 'code-block-wrapper';
                pre.parentElement.insertBefore(wrapper, pre);
                wrapper.appendChild(pre);

                const btn = document.createElement('button');
                btn.className = 'copy-code-btn';
                btn.innerHTML = '<i data-lucide="copy"></i>';
                btn.addEventListener('click', () => {
                    navigator.clipboard.writeText(block.innerText).then(() => {
                        btn.innerHTML = '<i data-lucide="check"></i>';
                        lucide.createIcons({ nodes: [btn] });
                        setTimeout(() => {
                            btn.innerHTML = '<i data-lucide="copy"></i>';
                            lucide.createIcons({ nodes: [btn] });
                        }, 1500);
                    });
                });
                wrapper.appendChild(btn);
                lucide.createIcons({ nodes: [btn] });
            });
            buildToc();
            if (window.MathJax?.typesetPromise) {
                MathJax.typesetPromise([preview]).then(updateCaretIndicator);
            } else {
                updateCaretIndicator();
            }
        }

        function updateWordCount() {
            const text = editor.value.trim();
            const words = text ? text.split(/\s+/).length : 0;
            wordCount.textContent = `${words.toLocaleString()} word${words !== 1 ? 's' : ''}`;
        }

        function copyHtml() {
            navigator.clipboard.writeText(getFullHtml())
                .then(() => alert('HTML copied to clipboard!'))
                .catch(err => console.error('Error copying HTML:', err));
        }

        function copyPreviewRich() {
            const btn = document.getElementById('preview-copy-rich');
            const clone = preview.cloneNode(true);

            // Replace MathJax-rendered containers with original LaTeX so rich editors don't mangle them
            const mathItems = window.MathJax?.startup?.document?.math;
            if (mathItems) {
                const containers = Array.from(clone.querySelectorAll('mjx-container'));
                Array.from(mathItems).forEach((item, i) => {
                    if (containers[i]) {
                        const [open, close] = item.display ? ['\\[', '\\]'] : ['\\(', '\\)'];
                        containers[i].replaceWith(document.createTextNode(`${open}${item.math}${close}`));
                    }
                });
            }

            const clipItem = new ClipboardItem({
                'text/html':  new Blob([clone.innerHTML],   { type: 'text/html' }),
                'text/plain': new Blob([preview.innerText], { type: 'text/plain' }),
            });
            navigator.clipboard.write([clipItem]).then(() => {
                btn.innerHTML = '<i data-lucide="check"></i>';
                lucide.createIcons({ nodes: [btn] });
                setTimeout(() => {
                    btn.innerHTML = '<i data-lucide="clipboard"></i>';
                    lucide.createIcons({ nodes: [btn] });
                }, 1500);
            }).catch(err => console.error('Copy failed:', err));

            const blob = new Blob([getFullHtml()], { type: 'text/html' });

            a.download = `${currentDocument || 'markdown-export'}.html`;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 0);

        function updateFileList() {
            fileList.innerHTML = '';
            const documents = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('markdown_')) documents.push(key.substring(9));
            }

            if (documents.length === 0) {
                const empty = document.createElement('span');
                empty.style.cssText = 'font-size:11px;color:var(--text-muted)';
                empty.textContent = 'No saved documents';

        const hljsTheme = document.getElementById('hljs-theme');
        const HLJS_DARK  = 'https://unpkg.com/@catppuccin/highlightjs/css/catppuccin-mocha.css';

        }

        function updateDocIndicator() {
            if (currentDocument) {
                saveToDocLabel.textContent = `Save to ${currentDocument}?`;
                saveToDocBtn.style.display = '';
                lucide.createIcons({ nodes: [saveToDocBtn] });
            } else {
                saveToDocBtn.style.display = 'none';
            }
            updateFileList();
        }

        function showUnsavedChanges() {
            saveIndicator.textContent = 'unsaved';
            saveIndicator.classList.add('unsaved');
        }

        function showSaved() {
            saveIndicator.textContent = 'saved';
            saveIndicator.classList.remove('unsaved');
        }

        function getFullHtml() {
            return `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${currentDocument || 'Markdown Export'}</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.78;
            color: #1a1a1a;
            max-width: 700px;
            margin: 0 auto;
            padding: 40px 28px 80px;
            font-size: 16px;
        }
        h1, h2 { border-bottom: 1px solid #e2e2e2; padding-bottom: 0.3em; }
        code {
            background: rgba(0,0,0,0.05);
            padding: 0.15em 0.4em;
            border-radius: 4px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Consolas', monospace;
            font-size: 0.85em;
        }
        pre {
            background: #f4f4f4;
            border: 1px solid #e2e2e2;
            border-radius: 6px;
            padding: 14px 16px;
            overflow: auto;
        }
        pre code { background: none; padding: 0; }
        blockquote {
            padding: 4px 16px;
            color: #999;
            border-left: 3px solid #e2e2e2;
            margin: 1em 0;
        }
        table { border-collapse: collapse; width: 100%; margin: 1em 0; }
        table th, table td { padding: 7px 12px; border: 1px solid #e2e2e2; text-align: left; }
        table th { background: #f4f4f4; font-weight: 600; }
        table tr:nth-child(2n) td { background: #f9f9f9; }
        img { max-width: 100%; border-radius: 4px; }
    </style>
    <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(', '\\)']], displayMath: [['\\[', '\\]']] }
    };
    <\/script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async><\/script>
</head>
<body>
${preview.innerHTML}
</body>
</html>`;
        }

        lucide.createIcons();
        updateDocIndicator();

        // Load saved theme, fall back to system preference
        const savedTheme = localStorage.getItem('dark_theme');
        const prefersDark = savedTheme !== null ? savedTheme === 'true' : window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (!prefersDark) {
            document.body.classList.remove('dark-theme');
        }
        applyTheme(prefersDark);
    </script>
</body>
</html>
